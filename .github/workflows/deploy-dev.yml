name: Deploy to Dev Environment
on:
  push:
    branches: [main]
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: mrcodeai-dev
  IMAGE_NAME: mrcodeai-app-dev
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - run: gcloud config set project ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/mrcodeai/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/mrcodeai/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/mrcodeai/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080 --memory=512Mi --cpu=1 --min-instances=0 --max-instances=1 --timeout=300
          env_vars: NODE_ENV=development,DATABASE_URL=${{ secrets.DATABASE_URL }},CUSTOM_ANTHROPIC_API_KEY=${{ secrets.CUSTOM_ANTHROPIC_API_KEY }}
      - run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Dev deployed to: $URL"
