name: Deploy to Production (mrcodeai.com)
on:
  workflow_dispatch:
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: mrcodeai
  IMAGE_NAME: mrcodeai-app
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - run: gcloud config set project ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/mrcodeai/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/mrcodeai/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/mrcodeai/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080 --memory=1Gi --cpu=1 --min-instances=0 --max-instances=3 --timeout=300
          env_vars: NODE_ENV=production,DATABASE_URL_PROD=${{ secrets.DATABASE_URL_PROD }},DATABASE_URL=${{ secrets.DATABASE_URL_PROD }},CUSTOM_ANTHROPIC_API_KEY=${{ secrets.CUSTOM_ANTHROPIC_API_KEY }}
      - run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
