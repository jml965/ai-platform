openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Website Builder Platform API — bilingual (AR/EN)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: build
    description: Website building via AI agents
  - name: agents
    description: Agent status and task tracking
  - name: tokens
    description: Token usage and cost management
  - name: billing
    description: Billing, subscriptions, and credits
  - name: teams
    description: Team management and permissions
  - name: deployments
    description: Project deployment management
  - name: notifications
    description: Email notification preferences
  - name: pwa
    description: Progressive Web App settings and generation
  - name: preview
    description: Live preview of generated websites
  - name: domains
    description: Custom domain management
  - name: plugins
    description: Plugin store and management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/provider:
    get:
      operationId: getAuthProvider
      tags: [auth]
      summary: Get auth provider
      description: Returns the current authentication provider (replit or local)
      responses:
        "200":
          description: Auth provider info
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                    enum: [replit, local]
                required:
                  - provider

  /auth/login:
    get:
      operationId: authLoginRedirect
      tags: [auth]
      summary: Start login flow (Replit)
      description: Redirects to Replit OIDC login (replit provider only)
      responses:
        "302":
          description: Redirect to Replit Auth
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login with email and password
      description: Authenticates a user with email and password (local provider only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
                - email
                - password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/callback:
    get:
      operationId: authCallback
      tags: [auth]
      summary: OIDC callback
      description: Handles Replit OIDC callback, creates session, redirects to app
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to app after successful auth

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register with email and password
      description: Creates a new user account (local provider only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                displayName:
                  type: string
              required:
                - email
                - password
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"


  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Logout
      description: Ends the user session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      description: Returns the authenticated user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update profile
      description: Update display name or locale preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      description: Returns all projects for the authenticated user
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create project
      description: Create a new website project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Max projects reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project
      description: Returns project details
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      description: Update project name or description
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      description: Delete a project and all its files
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/files:
    get:
      operationId: listProjectFiles
      tags: [projects]
      summary: List project files
      description: Returns all files in a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileListResponse"

  /projects/{projectId}/files/{fileId}:
    get:
      operationId: getProjectFile
      tags: [projects]
      summary: Get file content
      description: Returns content of a specific project file
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"

  /projects/{projectId}/snapshots:
    get:
      operationId: listSnapshots
      tags: [projects]
      summary: List snapshots
      description: Returns all backup snapshots for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotListResponse"
    post:
      operationId: createSnapshot
      tags: [projects]
      summary: Create snapshot
      description: Create a backup snapshot of the current project files
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSnapshotRequest"
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"

  /projects/{projectId}/snapshots/{snapshotId}:
    get:
      operationId: getSnapshot
      tags: [projects]
      summary: Get snapshot details
      description: Returns a single snapshot with its file data
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Snapshot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSnapshot
      tags: [projects]
      summary: Delete snapshot
      description: Delete a backup snapshot
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/snapshots/{snapshotId}/restore:
    post:
      operationId: restoreSnapshot
      tags: [projects]
      summary: Restore snapshot
      description: Restore project files from a snapshot
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/snapshots/{snapshotId}/compare:
    get:
      operationId: compareSnapshot
      tags: [projects]
      summary: Compare snapshot
      description: Compare current project files with a snapshot
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotCompareResponse"

  /build/start:
    post:
      operationId: startBuild
      tags: [build]
      summary: Start building
      description: Submit a build request to generate a website via AI agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartBuildRequest"
      responses:
        "202":
          description: Build started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildStatus"
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Build already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Token limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /build/{buildId}/status:
    get:
      operationId: getBuildStatus
      tags: [build]
      summary: Build status
      description: Returns the current status of a build
      parameters:
        - name: buildId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Build status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildStatus"

  /build/{buildId}/cancel:
    post:
      operationId: cancelBuild
      tags: [build]
      summary: Cancel build
      description: Cancel a build in progress
      parameters:
        - name: buildId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Build cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /build/{buildId}/logs:
    get:
      operationId: getBuildLogs
      tags: [build]
      summary: Build execution logs
      description: Returns the execution log for a build
      parameters:
        - name: buildId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Execution logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionLogListResponse"

  /agents/status:
    get:
      operationId: getAgentsStatus
      tags: [agents]
      summary: All agents status
      description: Returns the status of all agents
      responses:
        "200":
          description: Agent statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsStatusResponse"

  /agents/tasks/{taskId}:
    get:
      operationId: getAgentTask
      tags: [agents]
      summary: Agent task status
      description: Returns the status of a specific agent task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTask"

  /tokens/usage:
    get:
      operationId: getTokenUsage
      tags: [tokens]
      summary: Token usage
      description: Returns token usage filtered by date range and project
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [day, project, agent]
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenUsageResponse"

  /tokens/limits:
    get:
      operationId: getTokenLimits
      tags: [tokens]
      summary: Get limits
      description: Returns the user's current spending limits
      responses:
        "200":
          description: Current limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenLimits"
    patch:
      operationId: updateTokenLimits
      tags: [tokens]
      summary: Update limits
      description: Update daily or monthly spending limits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTokenLimitsRequest"
      responses:
        "200":
          description: Updated limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenLimits"

  /tokens/summary:
    get:
      operationId: getTokenSummary
      tags: [tokens]
      summary: Usage summary
      description: Returns a summary of token consumption and costs
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSummary"

  /tokens/notifications:
    get:
      operationId: getTokenNotifications
      tags: [tokens]
      summary: Get notifications
      description: Returns token-related notifications for the user
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /tokens/notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [tokens]
      summary: Mark notification read
      description: Marks a notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [notifications]
      summary: Get notification preferences
      description: Returns the user's email notification preferences
      responses:
        "200":
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    patch:
      operationId: updateNotificationPreferences
      tags: [notifications]
      summary: Update notification preferences
      description: Updates the user's email notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferencesRequest"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

  /billing/plans:
    get:
      operationId: listPlans
      tags: [billing]
      summary: List subscription plans
      description: Returns all available subscription plans
      responses:
        "200":
          description: Plan list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanListResponse"

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Current subscription
      description: Returns the user's current subscription
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /billing/subscription/cancel:
    post:
      operationId: cancelSubscription
      tags: [billing]
      summary: Cancel subscription
      description: Cancels the user's active subscription and reverts to the free plan
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  cancelledAt:
                    type: string
                    format: date-time
                required:
                  - success
        "404":
          description: No active subscription found

  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Create checkout session
      description: Creates a Stripe checkout session for subscribing or upgrading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /billing/webhook:
    post:
      operationId: stripeWebhook
      tags: [billing]
      summary: Stripe webhook
      description: Receives webhook events from Stripe
      responses:
        "200":
          description: Webhook processed

  /billing/invoices:
    get:
      operationId: listInvoices
      tags: [billing]
      summary: List invoices
      description: Returns the user's invoice history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"

  /billing/credits:
    get:
      operationId: getCredits
      tags: [billing]
      summary: Current credits
      description: Returns the user's current credit balance
      responses:
        "200":
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditBalance"

  /billing/topup:
    post:
      operationId: topupCredits
      tags: [billing]
      summary: Top up credits
      description: Create a payment session to add credits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopupRequest"
      responses:
        "200":
          description: Checkout URL for topup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams
      description: Returns teams the user belongs to
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamListResponse"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create team
      description: Create a new team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team
      description: Returns team details
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update team
      description: Update team name
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete team
      description: Delete a team (admin only)
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      tags: [teams]
      summary: List team members
      description: Returns all members of a team
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberListResponse"

  /teams/{teamId}/invite:
    post:
      operationId: inviteTeamMember
      tags: [teams]
      summary: Invite member
      description: Send an invitation to join the team
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "200":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teams/{teamId}/members/{userId}:
    patch:
      operationId: updateTeamMemberRole
      tags: [teams]
      summary: Update member role
      description: Change a team member's role
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: removeTeamMember
      tags: [teams]
      summary: Remove member
      description: Remove a member from the team
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teams/accept/{token}:
    post:
      operationId: acceptTeamInvite
      tags: [teams]
      summary: Accept invitation
      description: Accept a team invitation using the invite token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Joined team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /deployments/deploy:
    post:
      operationId: deployProject
      tags: [deployments]
      summary: Deploy a project
      description: Deploy a project to a public URL with a subdomain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployProjectRequest"
      responses:
        "200":
          description: Deployment created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentResponse"

  /deployments/{projectId}/status:
    get:
      operationId: getDeploymentStatus
      tags: [deployments]
      summary: Get deployment status
      description: Returns the deployment status for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Deployment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentResponse"

  /deployments/{projectId}/undeploy:
    post:
      operationId: undeployProject
      tags: [deployments]
      summary: Undeploy a project
      description: Stop and remove a deployed project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Undeployed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /deployments/{projectId}/redeploy:
    post:
      operationId: redeployProject
      tags: [deployments]
      summary: Redeploy a project
      description: Redeploy a project with latest changes
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Redeployed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentResponse"

  /deployments:
    get:
      operationId: listDeployments
      tags: [deployments]
      summary: List all deployments
      description: Returns all deployments for the current user
      responses:
        "200":
          description: Deployments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentListResponse"

  /projects/{projectId}/pwa:
    get:
      operationId: getPwaSettings
      tags: [pwa]
      summary: Get PWA settings
      description: Returns PWA settings for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: PWA settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PwaSettings"
    put:
      operationId: updatePwaSettings
      tags: [pwa]
      summary: Update PWA settings
      description: Create or update PWA settings for a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePwaSettingsRequest"
      responses:
        "200":
          description: Updated PWA settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PwaSettings"

  /projects/{projectId}/pwa/manifest:
    get:
      operationId: getPwaManifest
      tags: [pwa]
      summary: Get PWA manifest
      description: Returns a generated manifest.json for the project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Web app manifest
          content:
            application/manifest+json:
              schema:
                type: object

  /projects/{projectId}/pwa/service-worker:
    get:
      operationId: getPwaServiceWorker
      tags: [pwa]
      summary: Get PWA service worker
      description: Returns a generated service worker script for the project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Service worker JavaScript
          content:
            application/javascript:
              schema:
                type: string

  /preview/{projectId}:
    get:
      operationId: getPreview
      tags: [preview]
      summary: Live preview
      description: Returns the preview URL for a generated website
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Preview data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewResponse"

  /projects/{projectId}/domains:
    get:
      operationId: listDomains
      tags: [domains]
      summary: List project domains
      description: Returns all custom domains linked to a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Domain list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainListResponse"
    post:
      operationId: addDomain
      tags: [domains]
      summary: Add custom domain
      description: Links a custom domain to the project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDomainRequest"
      responses:
        "201":
          description: Domain added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"

  /projects/{projectId}/domains/{domainId}/verify:
    post:
      operationId: verifyDomain
      tags: [domains]
      summary: Verify domain DNS
      description: Checks DNS records and issues SSL certificate if verified
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainVerifyResponse"

  /projects/{projectId}/domains/{domainId}:
    delete:
      operationId: removeDomain
      tags: [domains]
      summary: Remove custom domain
      description: Removes a custom domain from the project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: domainId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Domain removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /plugins:
    get:
      operationId: listPlugins
      tags: [plugins]
      summary: List available plugins
      description: Returns all available plugins for the plugin store
      responses:
        "200":
          description: List of plugins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginListResponse"

  /plugins/{pluginId}:
    get:
      operationId: getPlugin
      tags: [plugins]
      summary: Get plugin details
      description: Returns full details and code for a specific plugin
      parameters:
        - name: pluginId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginDetail"
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/plugins:
    post:
      operationId: addPluginToProject
      tags: [plugins]
      summary: Add plugin to project
      description: Injects plugin code into the project files
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPluginRequest"
      responses:
        "200":
          description: Plugin added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddPluginResponse"
        "404":
          description: Plugin not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Plugin already added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            message_ar:
              type: string
          required:
            - code
            - message
      required:
        - error

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
      required:
        - page
        - limit
        - total

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        locale:
          type: string
          enum: [ar, en]
        dailyLimitUsd:
          type: number
        monthlyLimitUsd:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - displayName
        - locale

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        locale:
          type: string
          enum: [ar, en]

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, building, ready, failed]
        totalTokensUsed:
          type: integer
        totalCostUsd:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - status
        - createdAt

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        teamId:
          type: string
          format: uuid
      required:
        - name

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    ProjectListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - data
        - meta

    ProjectFile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        filePath:
          type: string
        content:
          type: string
        fileType:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - filePath
        - content
        - fileType

    ProjectFileListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFile"
      required:
        - data

    Snapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        label:
          type: string
        description:
          type: string
        filesData:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotFile"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - label
        - filesData
        - createdAt

    SnapshotFile:
      type: object
      properties:
        filePath:
          type: string
        content:
          type: string
        fileType:
          type: string
      required:
        - filePath
        - content
        - fileType

    CreateSnapshotRequest:
      type: object
      properties:
        label:
          type: string
        description:
          type: string
      required:
        - label

    SnapshotListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotSummary"
      required:
        - data

    SnapshotSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        label:
          type: string
        description:
          type: string
        fileCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - label
        - fileCount
        - createdAt

    SnapshotCompareResponse:
      type: object
      properties:
        added:
          type: array
          items:
            type: string
        removed:
          type: array
          items:
            type: string
        modified:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotFileDiff"
        unchanged:
          type: array
          items:
            type: string
      required:
        - added
        - removed
        - modified
        - unchanged

    SnapshotFileDiff:
      type: object
      properties:
        filePath:
          type: string
        snapshotContent:
          type: string
        currentContent:
          type: string
      required:
        - filePath
        - snapshotContent
        - currentContent

    StartBuildRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        prompt:
          type: string
      required:
        - projectId
        - prompt

    BuildStatus:
      type: object
      properties:
        buildId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        tasksTotal:
          type: integer
        tasksCompleted:
          type: integer
        totalTokensUsed:
          type: integer
        totalCostUsd:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - buildId
        - projectId
        - status

    BuildTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        agentType:
          type: string
          enum: [codegen, reviewer, fixer, filemanager]
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        targetFile:
          type: string
        tokensUsed:
          type: integer
        costUsd:
          type: number
        retryCount:
          type: integer
        durationMs:
          type: integer
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - agentType
        - status

    ExecutionLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        agentType:
          type: string
        action:
          type: string
        status:
          type: string
        details:
          type: object
        tokensUsed:
          type: integer
        durationMs:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - agentType
        - action
        - status

    ExecutionLogListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionLog"
      required:
        - data

    AgentsStatusResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            type: object
            properties:
              agentType:
                type: string
                enum: [codegen, reviewer, fixer, filemanager]
              activeTasks:
                type: integer
              totalCompleted:
                type: integer
              totalFailed:
                type: integer
            required:
              - agentType
              - activeTasks
      required:
        - agents

    TokenUsageEntry:
      type: object
      properties:
        date:
          type: string
          format: date
        projectId:
          type: string
          format: uuid
        projectName:
          type: string
        agentType:
          type: string
        tokensInput:
          type: integer
        tokensOutput:
          type: integer
        costUsd:
          type: number
      required:
        - tokensInput
        - tokensOutput
        - costUsd

    TokenUsageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TokenUsageEntry"
        totalTokens:
          type: integer
        totalCostUsd:
          type: number
      required:
        - data
        - totalTokens
        - totalCostUsd

    TokenLimits:
      type: object
      properties:
        dailyLimitUsd:
          type: number
        monthlyLimitUsd:
          type: number
        perProjectLimitUsd:
          type: number
        dailyUsedUsd:
          type: number
        monthlyUsedUsd:
          type: number
      required:
        - dailyLimitUsd
        - monthlyLimitUsd
        - dailyUsedUsd
        - monthlyUsedUsd

    UpdateTokenLimitsRequest:
      type: object
      properties:
        dailyLimitUsd:
          type: number
        monthlyLimitUsd:
          type: number
        perProjectLimitUsd:
          type: number

    TokenSummary:
      type: object
      properties:
        todayTokens:
          type: integer
        todayCostUsd:
          type: number
        monthTokens:
          type: integer
        monthCostUsd:
          type: number
        totalTokens:
          type: integer
        totalCostUsd:
          type: number
        remainingDailyUsd:
          type: number
        remainingMonthlyUsd:
          type: number
      required:
        - todayTokens
        - todayCostUsd
        - monthTokens
        - monthCostUsd

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        titleAr:
          type: string
        message:
          type: string
        messageAr:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - titleAr
        - message
        - messageAr
        - isRead
        - createdAt

    NotificationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
      required:
        - data

    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nameAr:
          type: string
        slug:
          type: string
        priceMonthlyUsd:
          type: number
        priceYearlyUsd:
          type: number
          nullable: true
        maxProjects:
          type: integer
        monthlyTokenLimit:
          type: integer
        features:
          type: object
        isActive:
          type: boolean
        supportType:
          type: string
          description: Support tier (community, priority, dedicated)
      required:
        - id
        - name
        - nameAr
        - slug
        - priceMonthlyUsd
        - maxProjects
        - monthlyTokenLimit

    PlanListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
      required:
        - data

    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        plan:
          $ref: "#/components/schemas/Plan"
        status:
          type: string
          enum: [active, cancelled, past_due, trialing]
        currentPeriodStart:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
      required:
        - id
        - userId
        - plan
        - status

    CreateCheckoutRequest:
      type: object
      properties:
        planId:
          type: string
          format: uuid
      required:
        - planId

    CheckoutResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
          format: uri
      required:
        - checkoutUrl

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amountUsd:
          type: number
        status:
          type: string
          enum: [paid, pending, failed]
        description:
          type: string
        paidAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - amountUsd
        - status
        - createdAt

    InvoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - data
        - meta

    CreditBalance:
      type: object
      properties:
        balanceUsd:
          type: number
        reserveUsd:
          type: number
        isLow:
          type: boolean
          description: True when balance is above zero but below $1
        isDepleted:
          type: boolean
          description: True when balance is zero or negative
      required:
        - balanceUsd

    TopupRequest:
      type: object
      properties:
        amountUsd:
          type: number
      required:
        - amountUsd

    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerId:
          type: string
          format: uuid
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ownerId

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    TeamListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
      required:
        - data

    TeamMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, developer, reviewer, viewer]
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - role

    TeamMemberListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
      required:
        - data

    InviteMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, developer, reviewer, viewer]
      required:
        - email
        - role

    UpdateMemberRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, developer, reviewer, viewer]
      required:
        - role

    NotificationPreferences:
      type: object
      properties:
        buildComplete:
          type: boolean
        buildError:
          type: boolean
        teamInvite:
          type: boolean
        subscriptionRenewal:
          type: boolean
      required:
        - buildComplete
        - buildError
        - teamInvite
        - subscriptionRenewal

    UpdateNotificationPreferencesRequest:
      type: object
      properties:
        buildComplete:
          type: boolean
        buildError:
          type: boolean
        teamInvite:
          type: boolean
        subscriptionRenewal:
          type: boolean

    PreviewResponse:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        previewUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [ready, building, not_available]
      required:
        - projectId
        - status

    DeployProjectRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
      required:
        - projectId

    DeploymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        subdomain:
          type: string
        url:
          type: string
        status:
          type: string
          enum: [deploying, active, stopped, failed]
        version:
          type: integer
